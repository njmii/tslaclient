<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Add Client</title>

<link rel="stylesheet" href="css/main.css">

<style>

.section{
    margin-bottom:28px;
}

.section h3{
    margin-bottom:12px;
    color:#d71920;
    font-size:18px;
}

.input{

    width:100%;
    padding:16px;

    margin-bottom:14px;

    border:1px solid #ececec;

    border-radius:16px;

    font-size:16px;

    background:white;

}

.upload{

    border:2px dashed #d71920;

    border-radius:18px;

    padding:28px;

    text-align:center;

    color:#777;

    margin-bottom:18px;

}

.preview{

    display:none;

    background:white;

    padding:20px;

    border-radius:18px;

    text-align:center;

    margin-bottom:18px;

}

.save{

    width:100%;

    background:#d71920;

    color:white;

    border:none;

    border-radius:18px;

    padding:18px;

    font-size:18px;

    cursor:pointer;

}

.back{

    text-decoration:none;

    color:#777;

    display:inline-block;

    margin-bottom:20px;

}

</style>

</head>

<body>

<div class="container">

<a href="client.html" class="back">

← Back

</a>

<header>

<img src="assets/tslalogo.png" class="logo">

<h1>Add Client</h1>

<p>Create a reusable cancellation profile.</p>

</header>

<div class="section">

<h3>Personal</h3>

<input class="input" placeholder="Name *">

<input class="input" placeholder="IC *">

<input class="input" placeholder="Phone *">

<input class="input" placeholder="Email">

<textarea class="input" placeholder="Address"></textarea>

</div>

<div class="section">

<h3>Bank</h3>

<input class="input" placeholder="Bank Name">

<input class="input" placeholder="Bank Account Number">

<input class="input" placeholder="Bank Account Name">

</div>

<div class="section">

<h3>Signature</h3>

<label class="upload">

📷 Upload Signature Image

<input
type="file"
accept="image/*"
style="display:none;"
id="signature">

</label>

<div class="preview" id="preview">

Signature Ready ✓

<br><br>

Background will be removed automatically.

</div>

</div>

<button class="save">

Save Client

</button>

</div>

<script>

const input=document.getElementById("signature");

const preview=document.getElementById("preview");

input.addEventListener("change",()=>{

preview.style.display="block";

});

</script>

</body>
</html>
