<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Clients</title><style>body{font-family:-apple-system,sans-serif;background:#f5f5f5;margin:0;padding:20px}.top{display:flex;gap:12px;align-items:center}.back{border:1px solid #d71920;background:#fff;color:#d71920;padding:8px 12px;border-radius:10px}input{width:100%;padding:14px;border:1px solid #ddd;border-radius:12px;box-sizing:border-box;margin:16px 0}.card{background:#fff;border-radius:16px;padding:16px;margin-top:12px;cursor:pointer}.add{position:fixed;right:20px;bottom:20px;width:60px;height:60px;border:none;border-radius:50%;background:#d71920;color:#fff;font-size:32px}.empty{text-align:center;color:#777;padding:40px}</style></head><body><div class='top'><button class='back' onclick='history.back()'>← Back</button><h2>Clients</h2></div><input id='q' placeholder='Search'><div id='list'></div><button class='add' onclick="location.href='add-client.html'">+</button><script src='js/storage.js'></script><script>const l=document.getElementById('list'),q=document.getElementById('q');const c=getClients();function d(a){l.innerHTML='';if(!a.length){l.innerHTML='<div class=empty>No clients yet</div>';return;}a.forEach(x=>{let e=document.createElement('div');e.className='card';e.innerHTML='<strong>'+x.name+'</strong><br>'+x.ic+'<br>'+x.phone;e.onclick=()=>location.href='client-profile.html?id='+x.id;l.appendChild(e);});}d(c);q.oninput=()=>{let s=q.value.toLowerCase();d(c.filter(x=>(x.name||'').toLowerCase().includes(s)||(x.ic||'').includes(s)||(x.phone||'').includes(s)));};</script></body></html>
