<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Clients</title><style>body{font-family:-apple-system,sans-serif;background:#f5f5f5;margin:0;padding:20px}h1{margin:0 0 16px}.search{width:100%;padding:14px;border:1px solid #ddd;border-radius:12px}.card{background:#fff;padding:16px;border-radius:14px;margin-top:12px;cursor:pointer}.add{position:fixed;bottom:20px;right:20px;width:60px;height:60px;border:none;border-radius:50%;background:#d71920;color:#fff;font-size:32px}.empty{color:#888;margin-top:30px;text-align:center}</style></head><body><h1>Clients</h1><input id='search' class='search' placeholder='Search'><div id='list'></div><button class='add' onclick="location.href='add-client.html'">+</button><script src='js/storage.js'></script><script>const list=document.getElementById('list'),search=document.getElementById('search');let clients=getClients();function render(a){list.innerHTML='';if(!a.length){list.innerHTML='<div class=empty>No clients yet</div>';return;}a.forEach(c=>{let d=document.createElement('div');d.className='card';d.innerHTML='<strong>'+c.name+'</strong><br>'+c.ic+'<br>'+c.phone;d.onclick=()=>location.href='client-profile.html?id='+c.id;list.appendChild(d);});}render(clients);search.oninput=()=>{let q=search.value.toLowerCase();render(clients.filter(c=>(c.name||'').toLowerCase().includes(q)||(c.ic||'').includes(q)||(c.phone||'').includes(q)));};</script></body></html>
