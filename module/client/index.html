<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TSLA Clients</title>

<link rel="stylesheet" href="../../css/main.css">
<link rel="stylesheet" href="client.css">

</head>

<body>

<div class="client-container">

    <header class="topbar">

        <img src="../../assets/tslalogo.png" class="mini-logo">

        <h1>Clients</h1>

    </header>

    <input
        id="searchInput"
        class="search"
        type="text"
        placeholder="Search client..."
    >

    <div id="clientList">

        <div class="client-card">

            <div>

                <h2>John Tan</h2>

                <p>Hospital • Life</p>

            </div>

            <span>></span>

        </div>

        <div class="client-card">

            <div>

                <h2>Nur Aisyah</h2>

                <p>Medical Card</p>

            </div>

            <span>></span>

        </div>

    </div>

    <button id="addClient">

        +

    </button>

</div>

<script src="client.js"></script>

</body>

</html>
